<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Run Scheduler — WIT Class Scheduler</title>
  <style>
    :root {
      --wit-gold: #FFCB05;
      --wit-red:  #99181B;
      --gray-50:  #f9fafb;
      --gray-100: #e5e7eb;
      --gray-200: #d1d5db;
      --gray-800: #1f2937;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; background: var(--gray-50); color: var(--gray-800); }

    .page { max-width: 900px; margin: 0 auto; padding: 24px 20px 40px; }
    h1   { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }

    /* ── Actions bar ── */
    .actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .btn-run { padding: 9px 22px; border-radius: 5px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: var(--wit-red); color: #fff; }
    .btn-run:hover:not(:disabled) { background: #7f1316; }
    .btn-run:disabled { opacity: .5; cursor: not-allowed; }

    /* Badge */
    .badge { font-size: 12px; font-weight: 600; padding: 3px 11px; border-radius: 999px; }
    .badge-idle    { background: #e5e7eb; color: #374151; }
    .badge-running { background: #fef3c7; color: #92400e; }
    .badge-done    { background: #d1fae5; color: #065f46; }
    .badge-error   { background: #fee2e2; color: #991b1b; }

    /* ── Log output ── */
    .log-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .log {
      background: #1a1a2e;
      color: #c9d1d9;
      border-radius: 6px;
      padding: 14px 16px;
      min-height: 320px;
      max-height: 60vh;
      overflow-y: auto;
      font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.65;
    }
    .log-empty { color: #6b7280; font-style: italic; }
    .ln       { display: block; }
    .ln-info  { color: #c9d1d9; }
    .ln-warn  { color: #fbbf24; }
    .ln-critical { color: #f87171; font-weight: 700; }
    .ln-error { color: #f87171; font-weight: 700; }
    .ln-pass  { color: #34d399; }
    .ln-fail  { color: #f87171; }
    .ln-sep   { color: #4b6589; }   /* ═══ section separators */

    /* ── Downloads ── */
    .downloads { margin-top: 14px; display: none; gap: 10px; flex-wrap: wrap; align-items: center; }
    .downloads.show { display: flex; }
    .downloads-label { font-size: 13px; font-weight: 600; color: #374151; }
    .btn-dl {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 16px; border-radius: 5px;
      border: 1px solid var(--gray-200); background: #fff;
      color: var(--gray-800); text-decoration: none;
      font-size: 13px; font-weight: 500;
    }
    .btn-dl:hover { background: var(--gray-50); }
    .btn-dl-primary { background: var(--wit-red); color: #fff; border-color: var(--wit-red); }
    .btn-dl-primary:hover { background: #7f1316; }
  </style>
</head>
<body>
<div class="page">
  <h1>Run Scheduler</h1>
  <p class="sub">Runs the Python scheduler against the current input files and streams output live.</p>

  <div class="actions">
    <button class="btn-run" id="runBtn" onclick="startRun()">▶ Run Schedule</button>
    <span class="badge badge-idle" id="badge">Idle</span>
  </div>

  <div class="log-label">Output</div>
  <div class="log" id="log">
    <span class="log-empty">Output will appear here when you run the scheduler.</span>
  </div>

  <div class="downloads" id="downloads">
    <span class="downloads-label">Downloads:</span>
    <a class="btn-dl btn-dl-primary" href="/api/schedule" download="schedule.json">⬇ schedule.json</a>
    <a class="btn-dl" href="/api/schedule/csv" download="schedule.csv">⬇ schedule.csv</a>
    <a class="btn-dl" href="/schedule">📅 View Schedule</a>
  </div>
</div>

<script>
let _source = null;
let _running = false;

async function startRun() {
  if (_running) return;

  clearLog();
  document.getElementById('downloads').classList.remove('show');

  const res = await fetch('/api/run', { method: 'POST' });
  if (res.status === 409) {
    log('Scheduler already running — connecting to output stream…', 'info');
  } else if (!res.ok) {
    log('Failed to start: ' + (await res.text()), 'error');
    return;
  }

  setRunning(true);
  connectStream();
}

function connectStream() {
  _source = new EventSource('/api/run/stream');

  _source.onmessage = (e) => {
    if (e.data === '__DONE__') {
      _source.close(); _source = null;
      setRunning(false);
      setBadge('done');
      document.getElementById('downloads').classList.add('show');
      return;
    }
    log(e.data, classifyLine(e.data));
  };

  _source.addEventListener('warn',     (e) => log(e.data, 'warn'));
  _source.addEventListener('critical', (e) => log(e.data, 'critical'));
  _source.addEventListener('pass',     (e) => log(e.data, 'pass'));
  _source.addEventListener('fail',     (e) => log(e.data, 'fail'));

  _source.onerror = () => {
    if (!_running) return;
    _source.close(); _source = null;
    setRunning(false);
    setBadge('error');
    log('[Connection to server lost]', 'error');
  };
}

function classifyLine(text) {
  if (/^[═─\s]{4,}/.test(text)) return 'sep';
  return 'info';
}

function log(text, cls) {
  const el = document.getElementById('log');
  // Remove placeholder on first real line
  const empty = el.querySelector('.log-empty');
  if (empty) empty.remove();
  const span = document.createElement('span');
  span.className = `ln ln-${cls}`;
  span.textContent = text;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '<span class="log-empty">Starting…</span>';
}

function setRunning(state) {
  _running = state;
  document.getElementById('runBtn').disabled = state;
  if (state) setBadge('running');
}

function setBadge(state) {
  const b = document.getElementById('badge');
  b.className = 'badge badge-' + state;
  b.textContent = { idle: 'Idle', running: 'Running…', done: 'Complete ✓', error: 'Error ✗' }[state];
}

// On load: check if scheduler is already running and reconnect
fetch('/api/run/status').then(r => r.json()).then(({ running }) => {
  if (running) {
    clearLog();
    log('Reconnecting to running scheduler…', 'info');
    setRunning(true);
    connectStream();
  }
}).catch(() => {});
</script>

<script src="/web/nav.js"></script>
</body>
</html>
